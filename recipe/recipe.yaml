schema_version: 1

context:
  version: "0.11.0"

package:
  name: fps-contents
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-contents/fps_contents-${{ version }}.tar.gz
    sha256: c5cb8d41ec926b86c78b608ddd16c508d446db0e75c26cd3d756f6b8dada6003

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0
    - anyio >=4.9.0,<5

tests:
  - python:
      imports: fps_contents
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/contents
  summary: An FPS plugin for the contents API.

extra:
  recipe-maintainers:
    - davidbrochart
