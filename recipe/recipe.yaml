schema_version: 1

context:
  version: "0.11.2"

package:
  name: fps-contents
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-contents/fps_contents-${{ version }}.tar.gz
    sha256: 44b5c06e2c69b477147984c958dbd1606c85b240327891b580e6cc61aa0d3742

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - fastapi-core
    - fps
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-contents >=0.1.2,<0.2.0
    - starlette
    - structlog

tests:
  - python:
      imports: fps_contents
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/contents
  summary: An FPS plugin for the contents API.

extra:
  recipe-maintainers:
    - davidbrochart
